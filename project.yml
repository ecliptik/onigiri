name: Onigiri
# local.yml (gitignored) carries per-developer settings — the signing
# team. Required by xcodegen; create it once:
#   cp local.yml.example local.yml
include:
  - local.yml
options:
  bundleIdPrefix: com.ecliptik
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true

packages:
  OnigiriKit:
    path: Packages/OnigiriKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.7.0"

targets:
  Onigiri:
    type: application
    platform: iOS
    sources: [Onigiri]
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # iPhone + iPad — explicit since 1.3 (was xcodegen's silent default).
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OnigiriKit
      - target: OnigiriWatch
      - target: OnigiriWidgets
    info:
      path: Onigiri/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        # xcodegen defaults the generated plist to a literal "1.0" unless
        # told to reference the build setting.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen: {}
        # Full multitasking on iPad (Split View/Slide Over/Stage
        # Manager) requires supporting all four orientations.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Backups live in Documents/Backups — visible in the Files app.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSHealthShareUsageDescription: Onigiri reads your energy burn, weight, and nutrition history to show your daily calorie balance and goal progress.
        NSHealthUpdateUsageDescription: Onigiri saves the food, sodium, and water you log to Apple Health.
        NSCameraUsageDescription: Onigiri uses the camera to scan food barcodes.
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.logWater
            UIApplicationShortcutItemTitle: Log Water
            UIApplicationShortcutItemIconSymbolName: drop.fill
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.logMeal
            UIApplicationShortcutItemTitle: Log Meal
            UIApplicationShortcutItemIconSymbolName: fork.knife
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.logFood
            UIApplicationShortcutItemTitle: Log Food
            UIApplicationShortcutItemIconSymbolName: carrot
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.scanBarcode
            UIApplicationShortcutItemTitle: Scan Barcode
            UIApplicationShortcutItemIconSymbolName: barcode.viewfinder
    entitlements:
      path: Onigiri/Onigiri.entitlements
      properties:
        com.apple.developer.healthkit: true
        # Wakes the app for HealthKit changes so widgets refresh when a
        # log arrives from the watch (or any other app).
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriWidgets:
    type: app-extension
    platform: iOS
    sources: [OnigiriWidgets]
    dependencies:
      - package: OnigiriKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ecliptik.Onigiri.widgets
    info:
      path: OnigiriWidgets/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        # Must track the app's version: xcodegen defaults to a literal
        # "1.0" and xcodebuild warns on the mismatch.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: OnigiriWidgets/OnigiriWidgets.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriWatch:
    type: application
    platform: watchOS
    sources: [OnigiriWatch]
    dependencies:
      - package: OnigiriKit
      - target: OnigiriWatchWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ecliptik.Onigiri.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: OnigiriWatch/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        CFBundleShortVersionString: $(MARKETING_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ecliptik.Onigiri
        WKRunsIndependentlyOfCompanionApp: true
        NSHealthShareUsageDescription: Onigiri reads your energy burn and nutrition history to show your daily calorie balance.
        NSHealthUpdateUsageDescription: Onigiri saves the food, sodium, and water you log to Apple Health.
    entitlements:
      path: OnigiriWatch/OnigiriWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriWatchWidgets:
    type: app-extension
    platform: watchOS
    sources: [OnigiriWatchWidgets]
    dependencies:
      - package: OnigiriKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ecliptik.Onigiri.watchkitapp.widgets
    info:
      path: OnigiriWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: OnigiriWatchWidgets/OnigiriWatchWidgets.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [OnigiriUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    dependencies:
      - target: Onigiri

schemes:
  Onigiri:
    build:
      targets:
        Onigiri: all
        OnigiriUITests: [test]
    run:
      config: Debug
    test:
      targets:
        - OnigiriUITests
  OnigiriWatch:
    build:
      targets:
        OnigiriWatch: all
    run:
      config: Debug
