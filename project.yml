name: Onigiri
# local.yml (gitignored) carries per-developer settings — the signing
# team. Required by xcodegen; create it once:
#   cp local.yml.example local.yml
include:
  - local.yml
options:
  bundleIdPrefix: com.ecliptik
  # iOS 18 / watchOS 10: the lowest floor that gains devices without
  # losing APIs (see plans/archive/PLAN-1.8.md). 26-era APIs live behind
  # #available gates — the compiler enforces every new one.
  deploymentTarget:
    iOS: "18.0"
    watchOS: "10.0"
  createIntermediateGroups: true

packages:
  OnigiriKit:
    path: Packages/OnigiriKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: "2.5.5"

targets:
  Onigiri:
    type: application
    platform: iOS
    # SharedIntents compiles into each target that exposes intents —
    # NEVER move intents into the kit: linkd rejects SPM-delivered App
    # Shortcuts metadata (aggregateMetadataIsEmpty) and the app silently
    # never registers with Siri/Shortcuts (FB13281659, 2026-07-16).
    sources: [Onigiri, SharedIntents]
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # iPhone + iPad — explicit since 1.3 (was xcodegen's silent default).
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OnigiriKit
      - target: OnigiriWatch
      - target: OnigiriWidgets
    info:
      path: Onigiri/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        # Siri's recognizer mangles the app name ("only gary", live test
        # 2026-07-16) — pronunciation hints and plausible mishearings
        # teach it. Apple caps alternatives at 3 per app.
        INAlternativeAppNames:
          - INAlternativeAppName: Onigiri
            INAlternativeAppNamePronunciationHint: oh nee gee ree
          - INAlternativeAppName: Onigeeri
          - INAlternativeAppName: Nigiri
        # xcodegen defaults the generated plist to a literal "1.0" unless
        # told to reference the build setting.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        # HTTPS-only (system TLS); no proprietary encryption — skips the
        # export-compliance prompt on every upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        # iPhone is portrait-only, matching what's designed and tested
        # (the UI tests force portrait; landscape was an undeclared,
        # untested stretch). iPad below keeps all four.
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        # Full multitasking on iPad (Split View/Slide Over/Stage
        # Manager) requires supporting all four orientations.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Backups live in Documents/Backups — visible in the Files app.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSHealthShareUsageDescription: Onigiri reads your energy burn, weight, and nutrition history to show your daily calorie balance and goal progress.
        NSHealthUpdateUsageDescription: Onigiri saves the food, sodium, and water you log to Apple Health.
        NSCameraUsageDescription: Onigiri uses the camera to scan food barcodes and photograph nutrition labels.
        # The Today-card widget's + button deep-links into the Log sheet
        # (onigiri://log?day=YYYY-MM-DD).
        CFBundleURLTypes:
          - CFBundleURLName: com.ecliptik.Onigiri
            CFBundleURLSchemes:
              - onigiri
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.logWater
            UIApplicationShortcutItemTitle: Log Water
            UIApplicationShortcutItemIconSymbolName: drop.fill
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.logMeal
            UIApplicationShortcutItemTitle: Log Meal
            UIApplicationShortcutItemIconSymbolName: fork.knife
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.logFood
            UIApplicationShortcutItemTitle: Log Food
            UIApplicationShortcutItemIconSymbolName: carrot
          - UIApplicationShortcutItemType: com.ecliptik.Onigiri.scanBarcode
            UIApplicationShortcutItemTitle: Scan Barcode or Label
            UIApplicationShortcutItemIconSymbolName: barcode.viewfinder
    entitlements:
      path: Onigiri/Onigiri.entitlements
      properties:
        com.apple.developer.healthkit: true
        # Wakes the app for HealthKit changes so widgets refresh when a
        # log arrives from the watch (or any other app).
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriWidgets:
    type: app-extension
    platform: iOS
    # Just the water intent — the Control Center button runs it in this
    # process. Meal/food/status intents stay app-only (no widget uses
    # them; a second copy would double them in Shortcuts).
    sources: [OnigiriWidgets, SharedIntents/LogWaterIntent.swift]
    dependencies:
      - package: OnigiriKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ecliptik.Onigiri.widgets
    info:
      path: OnigiriWidgets/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        # Must track the app's version: xcodegen defaults to a literal
        # "1.0" and xcodebuild warns on the mismatch.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: OnigiriWidgets/OnigiriWidgets.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriWatch:
    type: application
    platform: watchOS
    # Water/meal/food/status intents for watch Siri — same per-target
    # rule as the phone (see the Onigiri target's note).
    sources: [OnigiriWatch, SharedIntents]
    dependencies:
      - package: OnigiriKit
      - target: OnigiriWatchWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ecliptik.Onigiri.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: OnigiriWatch/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        CFBundleShortVersionString: $(MARKETING_VERSION)
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ecliptik.Onigiri
        WKRunsIndependentlyOfCompanionApp: true
        NSHealthShareUsageDescription: Onigiri reads your energy burn and nutrition history to show your daily calorie balance.
        NSHealthUpdateUsageDescription: Onigiri saves the food, sodium, and water you log to Apple Health.
    entitlements:
      path: OnigiriWatch/OnigiriWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriWatchWidgets:
    type: app-extension
    platform: watchOS
    sources: [OnigiriWatchWidgets]
    dependencies:
      - package: OnigiriKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ecliptik.Onigiri.watchkitapp.widgets
    info:
      path: OnigiriWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Onigiri
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: OnigiriWatchWidgets/OnigiriWatchWidgets.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.com.ecliptik.Onigiri

  OnigiriUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [OnigiriUITests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    dependencies:
      - target: Onigiri

  # App-hosted unit tests — today the Foundation Models eval suite
  # (FoodIntelligence lives in the app target, which the kit's pure
  # swift-test suite can't reach). The evals are opt-in via
  # TEST_RUNNER_ONIGIRI_AI_EVALS=1 and skip without it, so this target
  # costs a normal test run nothing.
  OnigiriTests:
    type: bundle.unit-test
    platform: iOS
    sources: [OnigiriTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # Same as OnigiriUITests: a MainActor default isolates the whole
        # XCTestCase subclass and collides with its nonisolated ObjC
        # inits. Tests opt into @MainActor explicitly.
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    dependencies:
      - target: Onigiri

schemes:
  Onigiri:
    build:
      targets:
        Onigiri: all
        OnigiriUITests: [test]
        OnigiriTests: [test]
    run:
      config: Debug
    test:
      targets:
        - OnigiriUITests
        - OnigiriTests
  OnigiriWatch:
    build:
      targets:
        OnigiriWatch: all
    run:
      config: Debug
